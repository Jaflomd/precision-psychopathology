    <div class="profile-block">
      <h2>Perfil bMSE</h2>
      <div class="h-sub">Radar bipolar de las dimensiones clínicas bMSE agrupadas por dominio (Psicomotricidad, Atención, Hedónico, Pensamiento, Valencia Negativa, Mentalización, Global). Visualización del estado dimensional en un solo gráfico.</div>
      <div id="radarBMSE" class="radar-container"></div>
    </div>
    <div class="profile-block">
      <h2>Perfil RDoC</h2>
      <div class="h-sub">Mapeo bMSE → 27 constructos RDoC (NIMH) en 6 dominios. Lectura dimensional: cada constructo agrega feeders bMSE con dirección patológica explícita.</div>
      <div id="radarRDoC" class="radar-container"></div>
    </div>
    <div class="profile-block">
      <h2>Perfil HiTOP / Forbes</h2>
      <div class="h-sub">Vista per-feeder, sin agregación. Cada subfactor muestra el valor crudo y nivel cualitativo de sus feeders. Invariante 4: configuraciones, no sumas/máximos.</div>
      <div class="hitop-legend">
        <span><span class="lg-dot" style="background:#a8a29e"></span>sin señal</span>
        <span><span class="lg-dot" style="background:var(--orange)"></span>señal (|1|)</span>
        <span><span class="lg-dot" style="background:var(--red);box-shadow:0 0 0 3px rgba(181,38,26,0.2)"></span>señal extrema (|2| · F4≥4)</span>
        <span><span class="lg-dot" style="background:#e7e5e4"></span>no evaluado</span>
      </div>
      ${hitopHtml}
    </div>
  `;
  // Wire radares SVG (renderizan dentro de sus div containers tras inyectar el HTML)
  try { if (typeof renderRadarBMSE === 'function') renderRadarBMSE(); }
  catch (e) { console.warn('bMSE radial:', e.message); }
  try { if (typeof renderRadarRDoC === 'function') renderRadarRDoC(); }
  catch (e) { console.warn('RDoC radial:', e.message); }
  try { _expUpdateCount(); } catch (e) {}
}

function copyMSEReport(btn) {
  const ta = document.getElementById('mseReportText');
  if (!ta) return;
  ta.select();
  try {
    document.execCommand('copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  } catch (e) {
    btn.textContent = '✗ Error';
    setTimeout(() => { btn.textContent = 'Copiar reporte'; }, 1800);
  }
}

function renderOutcomeCard(o) {
  const statusLabel = o.statusLabel || (o.status === 'red' ? 'Activo' : o.status === 'yellow' ? 'Vigilar' : 'Sin señal');
  const signalsHtml = (o.signals || []).map(s => `<div class="sig">${s}</div>`).join('');
  return `<div class="outcome-card status-${o.status}">
    <div class="outcome-head">
      <span class="o-title">${o.title}</span>
      <span class="o-badge">${statusLabel}</span>
    </div>
    <div class="o-summary">${o.summary}</div>
    ${signalsHtml ? `<div class="o-signals">${signalsHtml}</div>` : ''}
  </div>`;
}

function ensureHiTOPRuntimePatches() {
  if (typeof HITOP_MAP === 'undefined') return;
  const traumaSleep = HITOP_MAP['Sueño trauma/\ndesreg.'];
  if (!Array.isArray(traumaSleep)) return;
  const hasAutobiographicCoherence = traumaSleep.some(f => f.id === 'F7.coherencia-autobiografica');
  if (!hasAutobiographicCoherence) {
    traumaSleep.push({id:'F7.coherencia-autobiografica', inv:true, pole:'neg', w:0.75});
  }
}

function renderHiTOPGrid() {
  if (typeof HITOP_MAP === 'undefined' || typeof HITOP_GROUPS === 'undefined') {
    return '<div style="color:var(--text-muted);font-size:12px">HiTOP data no disponible.</div>';
  }
  ensureHiTOPRuntimePatches();
  const labels = Object.keys(HITOP_MAP);
  const ROW2_ORDER = ['Externalizing', 'Mania / Detachment', 'Thought Disorder', 'Sleep / Regulatory'];
  const row1 = HITOP_GROUPS.filter(g => !ROW2_ORDER.includes(g.name));
  const row2 = ROW2_ORDER.map(name => HITOP_GROUPS.find(g => g.name === name)).filter(Boolean);
  const rowGroups = [row1, row2];
  let html = '';
  rowGroups.forEach((rowGs, ri) => {
    html += `<div class="hitop-row">`;
    rowGs.forEach(g => {
      const nSubs = g.to - g.from + 1;
      html += `<div class="hitop-group" style="flex:${nSubs}">`;
      html += `<div class="hitop-group-head" style="color:${g.color};background:${g.color}11;border-bottom-color:${g.color}">${g.name.toUpperCase()}</div>`;
      html += `<div class="hitop-subs">`;
      for (let i = g.from; i <= g.to; i++) {
        const subName = labels[i].replace(/\n/g, ' ').replace('Cognición Bedside', 'Cognición');
        const feeders = HITOP_MAP[labels[i]];
        const feederData = feeders.map(getFeederSignal);
        const evaluated = feederData.filter(f => f.evaluated);
        const anyExtreme = evaluated.some(f => f.extreme);
        const anySignal = evaluated.some(f => f.signal);
        let subCls = '';
        if (anyExtreme) subCls = 'extreme';
        else if (anySignal) subCls = 'signal';
        html += `<div class="hitop-sub ${subCls}">`;
        html += `<div class="hitop-sub-head"><span class="sub-dot"></span><span class="sub-name">${subName}</span></div>`;
        html += `<div class="hitop-feeders">`;
        feederData.forEach((fd, fi) => {
          const d = feeders[fi];
          const dimObj = DIMS.find(x => x.id === d.id);
          const shortName = d.id.split('.').pop();
          let valTxt = '—', feederCls = '';
          if (!fd.evaluated) {
            valTxt = fd.ne ? 'NE' : '—';
            feederCls = 'ne';
          } else {
            valTxt = d.id === 'F4.contenido' ? String(fd.raw) : (fd.raw > 0 ? '+' : '') + fd.raw;
            if (fd.extreme) feederCls = 'extreme';
            else if (fd.signal) feederCls = 'signal';
          }
          const nivel = fd.evaluated ? (dimObj?.details?.[valTxt]?.nivel || dimObj?.scores?.[valTxt] || '') : '';
          const tip = fd.evaluated ? `${d.id} ${valTxt} — ${nivel}` : fd.ne ? `${d.id}: no evaluable` : fd.excluded ? `${d.id}: no aplica para este polo` : `${d.id}: no puntuado`;
          html += `<span class="hitop-feeder ${feederCls}" title="${escapeAttr(tip)}">${valTxt}`;
          if (nivel && nivel !== '—') html += `<span class="feeder-nivel">${shortLabel(nivel, 14)}</span>`;
          html += `</span>`;
        });
        html += `</div></div>`;
      }
      html += `</div></div>`;
    });
    html += `</div>`;
  });
  return html;
}

function summaryCard(title, score) {
  const v = fmtScore(score);
  let cls = 'ne';
  if (score !== null && score !== undefined && score !== 'NE') {
    const n = parseInt(score, 10);
    if (!Number.isNaN(n)) cls = n < 0 ? 'neg' : n > 0 ? 'pos' : '';
  }
  return `<div class="summary-card"><span class="sc-title">${title}</span><span class="sc-val ${cls}">${v}</span></div>`;
}

renderScoreView();

// ── BRAIN INFERENCE HOOKS ──
// Wrap saveState para que brainUpdate() corra tras cada score
if (typeof brainUpdate === 'function') {
  const _origSaveState = saveState;
  saveState = function() {
    _origSaveState();
    try { brainUpdate(); } catch (e) { console.warn('brainUpdate:', e); }
  };
  // Wrap renderProfile para refresh del widget al entrar a Perfil
  const _origRenderProfile = renderProfile;
  renderProfile = function() {
    _origRenderProfile();
    setTimeout(() => { try { brainUpdate(); } catch (e) {} }, 30);
  };
  // Primer update al cargar (en caso de state previa)
  try { brainUpdate(); } catch (e) {}
}

// ── CSV EXPORT (paciente actual + acumulador local) ──
// Una fila = un paciente. Columnas: meta, score/nivel/especificadores por ítem,
// crosswalk por sistema y por score elegido, y síntesis "redes" (outcomes Capa 2,
// perfiles bMSE/RDoC/HiTOP, reporte MSE). Acumula en localStorage 'bmse_export_rows'.
const BMSE_EXPORT_ACC_KEY = 'bmse_export_rows';

function _expNormHead(h) {
  return String(h == null ? '' : h).replace(/−/g, '-').replace(/\s+/g, '').replace(/^\+/, '');
}
function _expScoreKey(id) {
  const s = state[id] && state[id].score;
  return (s === null || s === undefined) ? '' : String(s);
}
function _expNivel(d, key, axisDetails, axisScores) {
  if (key === '' || key === 'NE') return key || '';
  if (axisScores && axisScores[key]) return axisScores[key];
  if (d.scores && d.scores[key]) return d.scores[key];
  if (d.details && d.details[key] && d.details[key].nivel) return d.details[key].nivel;
  if (axisDetails && axisDetails[key] && axisDetails[key].nivel) return axisDetails[key].nivel;
  return '';
}
function _expSpecifiers(id) {
  const sp = state[id] && state[id].specifiers;
  if (!sp) return '';
  const parts = [];
  Object.keys(sp).forEach(k => {
    const v = sp[k];
    if (v === true) parts.push(k);
    else if (v && v !== false) parts.push(k + '=' + v);
  });
  return parts.join(' | ');
}
function _expStandardCols(fw) {
  if (!fw || !fw.headers || !fw.rows) return null;
  const heads = fw.headers.map(_expNormHead);
  const want = { '-2': 1, '-1': 1, '0': 1, '1': 1, '2': 1 };
  return heads.filter(h => want[h]).length >= 4 ? heads : null;
}
function _expSerializeTable(fw) {
  if (!fw || !fw.rows) return '';
  const lines = [];
  if (fw.headers) lines.push(fw.headers.join(' | '));
  fw.rows.forEach(r => lines.push(r.join(' | ')));
  return lines.join('\n');
}
function _expFlatItems() {
  const out = [];
  DIMS.forEach(d => {
    if (d.type === 'multitest' && Array.isArray(d.tests)) {
      d.tests.forEach(t => out.push({ id: t.id, dim: d, frameworks: d.frameworks }));
    } else if (d.type === 'two_axis' && Array.isArray(d.axes)) {
      d.axes.forEach((a, i) => out.push({ id: a.id, dim: d, axisDetails: i === 0 ? d.details_p1 : d.details_p2, axisScores: a.scores, frameworks: d.frameworks }));
    } else {
      out.push({ id: d.id, dim: d, frameworks: d.frameworks });
    }
  });
  return out;
}
function _expSafe(fn, fb) { try { return fn(); } catch (e) { return fb; } }

function buildExportRow(pacienteId) {
  const columns = [], values = {};
  const put = (col, val) => {
    if (values[col] === undefined) columns.push(col);
    values[col] = (val === null || val === undefined) ? '' : val;
  };
  put('meta|paciente_id', pacienteId || '');
  put('meta|export_ts', new Date().toISOString());
  let nScored = 0;
  _expFlatItems().forEach(it => {
    const key = _expScoreKey(it.id);
    if (key !== '' && key !== 'NE') nScored++;
    put(it.id + '|score', key);
    put(it.id + '|nivel', _expNivel(it.dim, key, it.axisDetails, it.axisScores));
    put(it.id + '|especificadores', _expSpecifiers(it.id));
    const heads = _expStandardCols(it.frameworks);
    if (heads) {
      const col = (key && key !== 'NE') ? heads.indexOf(_expNormHead(key)) : -1;
      it.frameworks.rows.forEach(r => {
        const val = (col > 0 && r[col] !== undefined) ? r[col] : '';
        put(it.id + '|cw:' + r[0], (val === '—') ? '' : val);
      });
    } else if (it.frameworks) {
      put(it.id + '|crosswalk_full', _expSerializeTable(it.frameworks));
    }
  });
  put('meta|n_scored', nScored);
  // REDES / síntesis
  [['suicidio', typeof outcomeSuicidio === 'function' && outcomeSuicidio],
   ['agresividad', typeof outcomeAgresividad === 'function' && outcomeAgresividad],
   ['negligencia', typeof outcomeNegligencia === 'function' && outcomeNegligencia],
   ['capacidad', typeof outcomeCapacidad === 'function' && outcomeCapacidad]
  ].forEach(p => {
    if (!p[1]) return;
    const o = _expSafe(p[1], null);
    put('redes|outcome:' + p[0] + ':status', o ? (o.statusLabel || o.status) : '');
    put('redes|outcome:' + p[0] + ':summary', o ? o.summary : '');
    put('redes|outcome:' + p[0] + ':signals', o && o.signals ? o.signals.join(' | ') : '');
  });
  if (typeof calcDomainScore === 'function') {
    [['bMSE', typeof BMSE_MAP !== 'undefined' && BMSE_MAP],
     ['RDoC', typeof RDOC_MAP !== 'undefined' && RDOC_MAP],
     ['HiTOP', typeof HITOP_MAP !== 'undefined' && HITOP_MAP]
    ].forEach(pr => {
      if (!pr[1]) return;
      Object.keys(pr[1]).forEach(k => {
        const v = _expSafe(() => calcDomainScore(pr[1][k]), '');
        put('redes|' + pr[0] + ':' + k.replace(/\n/g, ' ').trim(), (typeof v === 'number') ? Math.round(v * 100) / 100 : '');
      });
    });
  }
  if (typeof generateMSEReport === 'function') put('redes|MSE_report', _expSafe(generateMSEReport, ''));
  return { columns, values };
}
function _expRowsToCSV(rows) {
  const cols = [], seen = {};
  rows.forEach(r => (r.__cols || Object.keys(r)).forEach(c => { if (!seen[c]) { seen[c] = 1; cols.push(c); } }));
  const esc = v => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
  const out = [cols.map(esc).join(',')];
  rows.forEach(r => out.push(cols.map(c => esc(r[c])).join(',')));
  return out.join('\r\n');
}
function _expDownload(csv, fname) {
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function _expStamp() { return new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19); }
function _expLoadAcc() { try { return JSON.parse(localStorage.getItem(BMSE_EXPORT_ACC_KEY)) || []; } catch (e) { return []; } }
function _expSaveAcc(a) { localStorage.setItem(BMSE_EXPORT_ACC_KEY, JSON.stringify(a)); }
function _expRowToFlat(row) { const o = {}; row.columns.forEach(c => { o[c] = row.values[c]; }); o.__cols = row.columns; return o; }

function exportAddAndDownloadAll() {
  const scored = _expFlatItems().filter(it => { const k = _expScoreKey(it.id); return k !== '' && k !== 'NE'; }).length;
  if (scored === 0 && !confirm('No hay dimensiones puntuadas en el paciente actual. ¿Exportar de todos modos?')) return;
  const pid = prompt('ID del paciente (etiqueta libre, sin datos identificables):', 'P-' + _expStamp());
  if (pid === null) return;
  const row = buildExportRow(pid);
  const acc = _expLoadAcc();
  acc.push(_expRowToFlat(row));
  _expSaveAcc(acc);
  _expDownload(_expRowsToCSV(acc), 'bmse_export_' + acc.length + 'pac_' + _expStamp() + '.csv');
  _expUpdateCount();
}
function exportSoloActual() {
  const pid = prompt('ID del paciente (solo este, no se acumula):', 'P-' + _expStamp());
  if (pid === null) return;
  const row = buildExportRow(pid);
  _expDownload(_expRowsToCSV([_expRowToFlat(row)]), 'bmse_' + (pid || 'paciente') + '_' + _expStamp() + '.csv');
}
function exportDownloadAcc() {
  const acc = _expLoadAcc();
  if (!acc.length) { alert('El acumulado está vacío. Usa "Agregar paciente actual" primero.'); return; }
  _expDownload(_expRowsToCSV(acc), 'bmse_export_' + acc.length + 'pac_' + _expStamp() + '.csv');
}
function exportResetAcc() {
  if (confirm('¿Borrar el acumulado de exportación? (no afecta al paciente cargado)')) {
    localStorage.removeItem(BMSE_EXPORT_ACC_KEY);
    _expUpdateCount();
  }
}
function _expUpdateCount() {
  const el = document.getElementById('exportAccCount');
  if (el) el.textContent = _expLoadAcc().length;
}

// ── MOBILE ACTION BAR LOGIC ──
function mobileSweepAction() {
  const sweepBtn = document.getElementById('sweepBtn');
  if (sweepBtn && !sweepBtn.disabled) sweepBtn.click();
}

function mobileResetConfirm() {
  if (confirm('¿Limpiar toda la evaluación y comenzar de nuevo?')) {
    localStorage.removeItem('bmse_state_v2');
    state = defaultState();
    Object.keys(tentative).forEach(k => delete tentative[k]);
    renderScoreView();
    showView('score');
    syncMobileBar();
  }
}

// syncMobileBar: replica estado del sweepBtn nativo al bar mobile.
// Se llama desde updateProgress() después de cada cambio de score.
function syncMobileBar() {
  const sweepBtn = document.getElementById('sweepBtn');
  const mobSweep = document.getElementById('mobSweepBtn');
  const mobProfile = document.getElementById('mobProfileBtn');
  if (!mobSweep) return;
  if (sweepBtn) {
    mobSweep.textContent = sweepBtn.textContent || 'Marcar normales';
    mobSweep.disabled = sweepBtn.disabled;
    mobSweep.style.opacity = sweepBtn.disabled ? '0.5' : '1';
    const allDone = sweepBtn.disabled && sweepBtn.textContent === 'Todo puntuado';
    if (mobProfile) {
      mobProfile.style.background = allDone ? 'var(--teal)' : '';
      mobProfile.style.color = allDone ? '#fff' : '';
      mobProfile.style.border = allDone ? 'none' : '';
    }
  }
}

// syncMobileBar ya se llama desde updateProgress().
// Sync inicial en caso de que updateProgress haya corrido antes de que el bar exista.
setTimeout(syncMobileBar, 150);
